<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bikoulova Behavioral Health</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      max-width: 1100px;
      padding: 20px;
      animation: fadeIn 1.2s ease-in-out;
    }

    /* BIGGER LOGO */
    img {
      width: 85%;
      max-width: 900px;
      margin-bottom: 25px;
    }

    .location {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: #555;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
    }

    .coming {
      font-size: 13px;
      color: #b89b5e;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      img {
        width: 95%;
      }

      .location {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="Bikoulova logo" />

    <div class="location">
      Seattle, WA
    </div>

    <div class="coming">
      Coming Soon
    </div>
  </div>
</body>
</html>
