<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bikoulova Behavioral Health</title>

  <!-- Google Font (luxury feel) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      font-family: 'Inter', sans-serif;
    }

    .container {
      max-width: 1100px;
      padding: 20px;
    }

    img {
      width: 75%;
      max-width: 780px;
      margin-bottom: 60px;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #111;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .coming {
      font-size: 14px;
      color: #b89b5e;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* subtle fade-in animation */
    .container {
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile optimization */
    @media (max-width: 600px) {
      img {
        width: 90%;
      }

      .tagline {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="Bikoulova logo" />

    <div class="tagline">
      Modern Psychiatry in Seattle, Washington
    </div>

    <div class="coming">
      Coming Soon
    </div>
  </div>
</body>
</html>
